<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>おいしいおさかな</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="page-shell topbar-inner">
      <a class="wordmark" href="index.html">おいしい<span>おさかな</span></a>
      <a class="topbar-link" href="board.html">みんなのQ&amp;A →</a>
    </div>
  </header>

  <main class="chat-shell">
    <div class="chat-card card">

      <!-- メッセージ一覧 -->
      <div class="message-list" id="message-list">
        <div class="bubble-wrap ai">
          <div class="bubble">
            こんにちは！AIおさかなアシスタントです。気になる魚料理についてお調べします。
          </div>
        </div>
      </div>

      <!-- AIが回答した後に表示するアクションボタン -->
      <div class="action-area" id="action-area" hidden>
        <p class="action-label">最後の質問と回答を掲示板で共有しますか？</p>
        <div class="action-buttons">
          <button class="btn btn-ghost" id="btn-resolved">やめておく</button>
          <button class="btn btn-primary" id="btn-share">共有する</button>
        </div>
      </div>

      <!-- POSTするためのフォーム -->
      <div class="share-panel" id="share-panel" hidden>
        <p class="action-label">掲示板に登録する情報を入力してください。</p>
        <form id="share-form" novalidate>
          <div class="share-fields">
            <div class="field">
              <label for="name">お名前</label>
              <input type="text" id="name" required />
            </div>
            <div class="field">
              <label for="email">メールアドレス</label>
              <input type="email" id="email" required />
            </div>
          </div>
          <p class="share-error" hidden>送信に失敗しました。時間をおいて再度お試しください。</p>
          <button type="submit" class="btn btn-primary">送信する</button>
        </form>
      </div>

      <!-- エンジンセレクター -->
      <div class="engine-selector-area">
        <div class="engine-dropdown" id="engine-dropdown">
          <button type="button" class="engine-dropdown-trigger" id="engine-dropdown-trigger" aria-haspopup="listbox" aria-expanded="false">
            <span class="engine-dropdown-current">
              <span class="engine-dropdown-label" id="engine-dropdown-label"></span>
              <span class="engine-dropdown-desc" id="engine-desc"></span>
            </span>
            <svg class="engine-dropdown-chevron" width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <ul class="engine-dropdown-list" id="engine-selector" role="listbox" hidden></ul>
        </div>
      </div>

      <!-- 入力エリア -->
      <div class="chat-input-area">
        <textarea id="chat-input" placeholder="質問を入力してください（Enterで送信）" rows="1"></textarea>
        <button class="btn btn-send" id="send-btn" aria-label="送信">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M2 9h14M9 2l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

    </div>
  </main>

  <script src="engine-options.js"></script>
  <script src="chat-options.js"></script>
</body>
</html>
